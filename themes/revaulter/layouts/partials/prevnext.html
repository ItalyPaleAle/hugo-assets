{{- $prev := .PrevInSection -}}
{{- $next := .NextInSection -}}
{{- if or $prev $next -}}
<nav class="prevnext" aria-label="Page navigation">

  {{- if $prev }}
  <a href="{{ $prev.RelPermalink }}" class="prevnext-link prev">
    <span class="prevnext-dir">← previous</span>
    <span class="prevnext-title">{{ $prev.Title }}</span>
  </a>
  {{- else }}
  <span></span>
  {{- end }}

  {{- if $next }}
  <a href="{{ $next.RelPermalink }}" class="prevnext-link next">
    <span class="prevnext-dir">next →</span>
    <span class="prevnext-title">{{ $next.Title }}</span>
  </a>
  {{- end }}

</nav>
{{- end -}}
