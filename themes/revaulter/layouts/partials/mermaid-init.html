{{- if .Page.Store.Get "hasMermaid" -}}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');

  function getTheme() {
    return darkQuery.matches ? 'dark' : 'default';
  }

  mermaid.initialize({
    startOnLoad: false,
    theme: getTheme(),
    fontFamily: '"Geist", system-ui, sans-serif',
    themeVariables: {
      /* Light */
      primaryColor:       darkQuery.matches ? '#fb923c' : '#c2410c',
      primaryTextColor:   darkQuery.matches ? '#0f0f0f' : '#fafafa',
      primaryBorderColor: darkQuery.matches ? '#fb923c' : '#c2410c',
      lineColor:          darkQuery.matches ? '#a3a3a3' : '#525252',
      secondaryColor:     darkQuery.matches ? '#171717' : '#f3f3f3',
      tertiaryColor:      darkQuery.matches ? '#1c1c1c' : '#fbe9dc',
      background:         darkQuery.matches ? '#0f0f0f' : '#fafafa',
      mainBkg:            darkQuery.matches ? '#171717' : '#ffffff',
      nodeBorder:         darkQuery.matches ? '#262626' : '#e5e5e5',
      clusterBkg:         darkQuery.matches ? '#171717' : '#f3f3f3',
      titleColor:         darkQuery.matches ? '#f5f5f5' : '#0a0a0a',
      edgeLabelBackground: darkQuery.matches ? '#1c1c1c' : '#f5f5f5',
    },
  });

  await mermaid.run({ querySelector: '.mermaid' });

  /* Re-render on OS color scheme change */
  darkQuery.addEventListener('change', async () => {
    mermaid.initialize({
      startOnLoad: false,
      theme: getTheme(),
    });
    document.querySelectorAll('.mermaid').forEach(el => {
      const src = el.dataset.src || el.textContent;
      el.dataset.src = src;
      el.removeAttribute('data-processed');
      el.innerHTML = src;
    });
    await mermaid.run({ querySelector: '.mermaid' });
  });
</script>
{{- end -}}
