<nav class="docs-sidebar sticky top-16 h-[calc(100vh-4rem)] overflow-y-auto border-r border-rule px-8 py-7">

  {{- $currentPage := . -}}

  {{- range .Site.Sections }}
  {{- $section := . -}}
  <div class="mb-[1.375rem]">

    <div class="nav-section-label">{{ .Title }}</div>

    <!-- Section _index itself, if it has meaningful content -->
    {{- if .Content }}
    <ul class="list-none m-0 p-0 mb-1">
      <li>
        <a href="{{ .RelPermalink }}"
           class="nav-link{{ if eq $currentPage.RelPermalink .RelPermalink }} active{{ end }}"
           {{- if eq $currentPage.RelPermalink .RelPermalink }} aria-current="page"{{ end }}>
          {{ .Params.nav_title | default .Title }}
        </a>
      </li>
    </ul>
    {{- end }}

    <ul class="list-none m-0 p-0">
      {{- range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}"
           class="nav-link{{ if eq $currentPage.RelPermalink .RelPermalink }} active{{ end }}"
           {{- if eq $currentPage.RelPermalink .RelPermalink }} aria-current="page"{{ end }}>
          {{ .Params.nav_title | default .Title }}
        </a>
      </li>
      {{- end }}
    </ul>

  </div>
  {{- end }}

</nav>
