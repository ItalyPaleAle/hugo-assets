{{- with .Site.Params.github_repo }}
{{- $editPath := $.Params.source_path | default $.File.Path -}}
{{- $editBase := printf "%s/edit/%s/" . ($.Site.Params.github_branch | default "main") -}}
<a href="{{ $editBase }}{{ $editPath }}" class="edit-link" target="_blank" rel="noopener noreferrer">
  <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor"
       stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M1 12l3-1L11 4a1.414 1.414 0 0 0-2-2L2 9l-1 3z"/>
    <path d="M9 2l2 2"/>
  </svg>
  Edit this page on GitHub
</a>
{{- end }}
