<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}" class="h-full">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="min-h-full bg-bg text-ink font-sans antialiased">

  {{- partial "header.html" . -}}

  <div class="grid min-h-[calc(100vh-4rem)]" style="grid-template-columns: 244px 1fr 220px;">

    {{- partial "nav.html" . -}}

    <main class="min-w-0">
      <div class="px-14 py-10 pb-15 max-w-[820px]">
        {{- block "main" . }}{{- end }}
      </div>
    </main>

    {{- partial "toc.html" . -}}

  </div>

  {{- partial "mermaid-dev.html" . -}}

  <script>
  (function () {
    const button = document.querySelector('.mobile-menu-toggle');
    const nav = document.querySelector('#site-nav');
    if (!button || !nav) return;

    function setOpen(open) {
      nav.classList.toggle('is-open', open);
      button.setAttribute('aria-expanded', String(open));
      button.setAttribute('aria-label', open ? 'Close navigation' : 'Open navigation');
    }

    button.addEventListener('click', () => setOpen(!nav.classList.contains('is-open')));
    nav.addEventListener('click', (event) => {
      if (event.target.closest('a')) setOpen(false);
    });
    window.addEventListener('resize', () => {
      if (window.innerWidth > 960) setOpen(false);
    });
  })();

  (function () {
    const buttons = document.querySelectorAll('[data-copy-code]');
    if (!buttons.length || !navigator.clipboard) return;

    buttons.forEach((button) => {
      button.addEventListener('click', async () => {
        const block = button.closest('.code-block');
        const code = block && block.querySelector('code');
        if (!code) return;

        try {
          await navigator.clipboard.writeText(code.innerText.replace(/\n$/, ''));
          button.classList.add('copied');
          button.setAttribute('aria-label', 'Copied code to clipboard');
          window.setTimeout(() => {
            button.classList.remove('copied');
            button.setAttribute('aria-label', 'Copy code to clipboard');
          }, 1400);
        } catch (_) {
          button.classList.add('failed');
          button.setAttribute('aria-label', 'Could not copy code');
          window.setTimeout(() => {
            button.classList.remove('failed');
            button.setAttribute('aria-label', 'Copy code to clipboard');
          }, 1400);
        }
      });
    });
  })();
  </script>

</body>
</html>
