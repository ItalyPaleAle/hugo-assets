{{- $lang := .Type -}}
{{- $code := .Inner -}}

{{- if eq $lang "mermaid" -}}
  {{- /* Signal the page that mermaid.js must be loaded */ -}}
  {{- .Page.Store.Set "hasMermaid" true -}}
  <div class="mermaid-block">
    <pre class="mermaid">{{- $code -}}</pre>
  </div>
{{- else -}}
  {{- $highlighted := transform.Highlight $code $lang "" -}}
  <div class="code-block">
    <button class="code-copy" type="button" aria-label="Copy code to clipboard" title="Copy code" data-copy-code>
      <svg class="code-copy-icon code-copy-icon-copy" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
      </svg>
      <svg class="code-copy-icon code-copy-icon-check" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
      <svg class="code-copy-icon code-copy-icon-failed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6 6 18"/>
        <path d="m6 6 12 12"/>
      </svg>
    </button>
    {{- $highlighted -}}
  </div>
{{- end -}}
