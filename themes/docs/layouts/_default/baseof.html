<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}" class="h-full">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="min-h-full bg-bg text-ink font-sans antialiased">

  {{- partial "header.html" . -}}

  <div class="grid min-h-[calc(100vh-4rem)]" style="grid-template-columns: 244px 1fr 220px;">

    {{- partial "nav.html" . -}}

    <main class="min-w-0">
      <div class="px-14 py-10 pb-15 max-w-205">
        {{- block "main" . }}{{- end }}
      </div>
    </main>

    {{- partial "toc.html" . -}}

  </div>

  {{- partial "mermaid-init.html" . -}}

  {{- partial "plausible-analytics.html" . -}}

  <script>
  (function () {
    const button = document.querySelector('.mobile-menu-toggle');
    const nav = document.querySelector('#site-nav');
    if (!button || !nav) return;

    function setOpen(open) {
      nav.classList.toggle('is-open', open);
      button.setAttribute('aria-expanded', String(open));
      button.setAttribute('aria-label', open ? 'Close navigation' : 'Open navigation');
    }

    button.addEventListener('click', () => setOpen(!nav.classList.contains('is-open')));
    nav.addEventListener('click', (event) => {
      if (event.target.closest('a')) setOpen(false);
    });
    window.addEventListener('resize', () => {
      if (window.innerWidth > 960) setOpen(false);
    });
  })();

  (function () {
    const buttons = document.querySelectorAll('[data-copy-code]');
    if (!buttons.length || !navigator.clipboard) return;

    buttons.forEach((button) => {
      button.addEventListener('click', async () => {
        const block = button.closest('.code-block');
        const code = block && block.querySelector('code');
        if (!code) return;

        try {
          await navigator.clipboard.writeText(code.innerText.replace(/\n$/, ''));
          button.classList.add('copied');
          button.setAttribute('aria-label', 'Copied code to clipboard');
          window.setTimeout(() => {
            button.classList.remove('copied');
            button.setAttribute('aria-label', 'Copy code to clipboard');
          }, 1400);
        } catch (_) {
          button.classList.add('failed');
          button.setAttribute('aria-label', 'Could not copy code');
          window.setTimeout(() => {
            button.classList.remove('failed');
            button.setAttribute('aria-label', 'Copy code to clipboard');
          }, 1400);
        }
      });
    });
  })();

  (function () {
    const groups = document.querySelectorAll('[data-content-tabs]');
    if (!groups.length) return;

    groups.forEach((group, groupIndex) => {
      const tabs = Array.from(group.querySelectorAll(':scope > .content-tab'));
      if (!tabs.length) return;

      const tabList = document.createElement('div');
      tabList.className = 'content-tabs-list';
      tabList.setAttribute('role', 'tablist');
      tabList.setAttribute('aria-label', group.dataset.tabsLabel || 'Content tabs');

      const buttons = tabs.map((tab, tabIndex) => {
        const title = tab.dataset.tabTitle || `Tab ${tabIndex + 1}`;
        const tabId = `content-tab-${groupIndex}-${tabIndex}`;
        const panelId = `content-tab-panel-${groupIndex}-${tabIndex}`;
        const button = document.createElement('button');

        button.className = 'content-tabs-button';
        button.type = 'button';
        button.id = tabId;
        button.textContent = title;
        button.setAttribute('role', 'tab');
        button.setAttribute('aria-controls', panelId);

        tab.id = panelId;
        tab.setAttribute('role', 'tabpanel');
        tab.setAttribute('aria-labelledby', tabId);
        tabList.append(button);

        return button;
      });

      function selectTab(nextIndex, focus) {
        buttons.forEach((button, index) => {
          const selected = index === nextIndex;
          button.setAttribute('aria-selected', String(selected));
          button.tabIndex = selected ? 0 : -1;
          tabs[index].hidden = !selected;
        });

        if (focus) buttons[nextIndex].focus();
      }

      buttons.forEach((button, index) => {
        button.addEventListener('click', () => selectTab(index, false));
        button.addEventListener('keydown', (event) => {
          const current = buttons.indexOf(event.currentTarget);
          let next = current;

          if (event.key === 'ArrowRight') next = (current + 1) % buttons.length;
          if (event.key === 'ArrowLeft') next = (current - 1 + buttons.length) % buttons.length;
          if (event.key === 'Home') next = 0;
          if (event.key === 'End') next = buttons.length - 1;
          if (next === current) return;

          event.preventDefault();
          selectTab(next, true);
        });
      });

      group.prepend(tabList);
      group.classList.add('is-enhanced');
      selectTab(0, false);
    });
  })();
  </script>

</body>
</html>
